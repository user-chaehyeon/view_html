&lt;style&gt;:root {

  /* Internal implementation variables; not part of the agent contract. */
  --font-sans: -apple-system, system-ui, &quot;Segoe UI&quot;, sans-serif;
  --font-mono:
    ui-monospace, SFMono-Regular, &quot;SF Mono&quot;, Menlo, Consolas, &quot;Liberation Mono&quot;,

  --font-size-normal: max(11px, var(--font-size-base));

:root[data-theme=&quot;light&quot;] {
  color-scheme: light;
}

:root[data-theme=&quot;dark&quot;] {
  color-scheme: dark;
}

* {
  box-sizing: border-box;
}

html &gt; body {
  margin: 0;
  padding: 5px;
  color: var(--foreground);
  background: transparent !important;
  font-family: var(--font-sans);
  font-size: var(--font-size-normal);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
}

a {
  color: color-mix(in srgb, var(--viz-accent) 80%, var(--viz-text) 20%);
  cursor: pointer;
  font-weight: var(--viz-font-weight-medium);
  text-decoration: none;
  text-underline-offset: 2px;
}

a:is(:hover, :focus-visible) {
  text-decoration-line: underline;
  text-decoration-style: dashed;
  text-decoration-thickness: 0.5px;
}

h1,
h2,
h3,
h4,
h5,
h6,
p {
  margin-block: 0;
}

h1 {
  font-size: var(--font-size-h1);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h2 {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h3,
h4,
h5,
h6 {
  font-size: var(--font-size-h3);
  font-weight: var(--font-weight-medium);
  line-height: 1.3;
}

b,
strong,
th {
  font-weight: var(--font-weight-medium);
}

code:not(pre code) {
  display: inline;
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.92em;
  overflow-wrap: anywhere;
  -webkit-box-decoration-break: clone;
  box-decoration-break: clone;
  word-break: break-word;
}

#widget {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  padding: 0;
  background: transparent !important;
}

.card {
  min-width: 0;
  padding: 12px;
  overflow: hidden;
  overflow-wrap: break-word;
  border-radius: var(--radius-2xl);
  corner-shape: superellipse(1.5);
  color: var(--card-foreground);
  background: var(--card);
}

#widget &gt; :not(.card) {
  width: 100% !important;
  max-width: none !important;
  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

.tooltip {
  position: fixed;
  z-index: 50;
  top: 0;
  left: 0;
  width: max-content;
  max-width: min(
    20rem,
    var(--tooltip-available-width, calc(100vw - 10px)),
    calc(100vw - 10px)
  );
  max-height: min(
    var(--tooltip-available-height, calc(100vh - 10px)),
    calc(100vh - 10px)
  );
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--popover-foreground);
  background: var(--popover);
  box-shadow: none;
  font-size: var(--font-size-tooltip);
  line-height: var(--line-height-tooltip);
  overflow-wrap: break-word;
  white-space: normal;
  pointer-events: none;
  user-select: none;
}

.viz-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(max(180px, 24%), 1fr));
  gap: 10px;
}

.viz-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.viz-stat-value {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

.viz-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.viz-badge {
  padding: 3px 8px;
  border-radius: var(--radius-full);
  color: var(--accent-foreground);
  background: var(--accent);
  font-weight: var(--font-weight-medium);
}

small,
.text-small,
.viz-badge {
  font-size: var(--font-size-small);
  line-height: var(--line-height-small);
}

.text-muted {
  color: var(--muted-foreground);
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.viz-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.viz-controls &gt; .form-label {
  display: grid;
  min-width: min(100%, 260px);
  flex: 1 1 280px;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: baseline;
  gap: 2px 12px;
  margin-bottom: 0;
}

.viz-controls &gt; .form-label &gt; :is(.form-control, .form-range, .form-select) {
  grid-column: 1 / -1;
}

.btn,
.form-check-input,
.form-control,
.form-range,
.form-select {
  font: inherit;
}

.btn {
  appearance: button;
  display: inline-flex;
  inline-size: fit-content;
  max-inline-size: 100%;
  min-height: 28px;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 0;
  padding: 0 8px;
  -webkit-app-region: no-drag;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

.btn:is(.btn-block, .viz-tile) {
  inline-size: 100%;
}

.btn.viz-tile {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: normal;
}

a.btn {
  cursor: pointer;
  text-decoration: none;
}

.btn:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn-primary {
  border-color: transparent;
  color: var(--primary-foreground);
  background: var(--foreground);
  background-clip: padding-box;
}

.btn-primary .text-muted {
  color: color-mix(in srgb, var(--primary-foreground) 50%, transparent);
}

.btn-primary:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 80%, transparent);
  background-clip: padding-box;
}

.btn-ghost {
  border-color: transparent;
  color: var(--muted-foreground);
  background: transparent;
}

.btn-ghost:not(:disabled):hover {
  color: var(--foreground);
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

[data-lucide] {
  stroke-width: 1.6;
}

.form-label {
  display: block;
  margin-bottom: 6px;
  color: var(--foreground);
}

.form-control {
  display: block;
  width: 100%;
  min-height: 28px;
  padding: 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background: var(--secondary);
}

.form-control::placeholder {
  color: var(--muted-foreground);
}

.form-control[type=&quot;file&quot;] {
  padding: 0;
  overflow: hidden;
  cursor: var(--cursor-interaction, pointer);
}

.form-control[type=&quot;file&quot;]::file-selector-button {
  min-height: 26px;
  margin-right: 8px;
  padding: 0 8px;
  border: 0;
  border-right: 1px solid var(--input);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: inherit;
  font: inherit;
}

.form-control[type=&quot;file&quot;]:not(:disabled):hover::file-selector-button {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-control-color[type=&quot;color&quot;] {
  width: 40px;
  height: 28px;
  padding: 3px;
  cursor: var(--cursor-interaction, pointer);
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch-wrapper {
  padding: 0;
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch {
  border: 0;
  border-radius: calc(var(--radius-lg) - 4px);
  corner-shape: superellipse(1.5);
}

textarea.form-control {
  height: auto;
  min-height: 72px;
  padding: 8px 10px;
  resize: vertical;
}

.form-control:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-control:disabled,
.form-select:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.form-select {
  appearance: none;
  display: block;
  width: 100%;
  min-height: 28px;
  margin: 0;
  padding: 0 32px 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background-color: var(--secondary);
  background-image:
    linear-gradient(45deg, transparent 50%, var(--muted-foreground) 50%),
    linear-gradient(135deg, var(--muted-foreground) 50%, transparent 50%);
  background-position:
    calc(100% - 14px) 50%,
    calc(100% - 10px) 50%;
  background-repeat: no-repeat;
  background-size: 4px 4px;
  cursor: var(--cursor-interaction, default);
}

.form-select:not(:disabled):hover {
  background-color: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-select:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-check {
  display: flex;
  min-height: 20px;
  align-items: center;
  gap: 6px;
}

.form-check-input {
  appearance: none;
  width: 14px;
  height: 14px;
  flex: 0 0 auto;
  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);
  background-color: transparent;
  cursor: var(--cursor-interaction, default);
  transition:
    background-color 150ms,
    border-color 150ms,
    box-shadow 150ms;
}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;] {
  border-color: var(--input);
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background-color: var(--secondary);
  box-shadow: var(--shadow-sm);
}

.form-check:not(.form-switch)
  .form-check-input:not(:disabled):not(:checked):hover {
  background-color: var(--card);
}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;]:checked {
  border-color: var(--primary);
  background-color: var(--primary);
}

.form-check:not(.form-switch)
  .form-check-input[type=&quot;checkbox&quot;]:checked::before {
  display: block;
  width: 100%;
  height: 100%;
  background: var(--primary-foreground);
  content: &quot;&quot;;
  mask: var(--checkmark-image) center / 12px 12px no-repeat;
}

.form-check-input[type=&quot;radio&quot;] {
  width: 14px;
  height: 14px;
  border-radius: var(--radius-full);
}

.form-check-input[type=&quot;radio&quot;]:checked {
  border: 2px solid var(--primary);
  background:
    radial-gradient(circle, var(--primary-foreground) 0 2.5px, transparent 3px),
    var(--primary);
}

.form-check:not(.form-switch) .form-check-input:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

.form-check:not(.form-switch) .form-check-input:disabled {
  cursor: not-allowed;
  pointer-events: none;
}

.form-check:not(.form-switch) .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
}

.form-switch .form-check-input:disabled,
.form-switch .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
  opacity: 0.6;
}

.form-check-label {
  color: var(--foreground);
  cursor: var(--cursor-interaction, default);
}

.form-switch .form-check-input {
  position: relative;
  width: 32px;
  height: 20px;
  border: 0;
  border-radius: var(--radius-full);
  background: var(--muted);
  box-shadow: none;
  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input::before {
  position: absolute;
  top: 50%;
  left: 0;
  width: 16px;
  height: 16px;
  box-sizing: border-box;
  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;body&gt;
&lt;div id=&quot;training-metrics-comparison&quot;&gt;

    &lt;/label&gt;

      &lt;/select&gt;
    &lt;/label&gt;
    &lt;label class=&quot;form-label&quot; for=&quot;tmc-ratio&quot;&gt;Pilot ratio

      &lt;/select&gt;
    &lt;/label&gt;
    &lt;label class=&quot;form-label&quot; for=&quot;tmc-split&quot;&gt;Loss series
      &lt;select class=&quot;form-select&quot; id=&quot;tmc-split&quot;&gt;
        &lt;option value=&quot;Validation&quot; selected&gt;Validation&lt;/option&gt;
        &lt;option value=&quot;Train&quot;&gt;Train&lt;/option&gt;
        &lt;option value=&quot;Both&quot;&gt;Train + Validation&lt;/option&gt;
      &lt;/select&gt;
    &lt;/label&gt;
  &lt;/section&gt;

  &lt;fieldset class=&quot;tmc-experiments&quot;&gt;
    &lt;legend&gt;Experiments&lt;/legend&gt;
    &lt;div class=&quot;viz-row&quot;&gt;
      &lt;label class=&quot;form-check&quot; for=&quot;tmc-exp-1080-dft&quot;&gt;&lt;input class=&quot;form-check-input tmc-exp&quot; id=&quot;tmc-exp-1080-dft&quot; type=&quot;checkbox&quot; value=&quot;g1080_dft&quot; checked&gt;&lt;span class=&quot;form-check-label&quot;&gt;1080 / DFT&lt;/span&gt;&lt;/label&gt;

  #training-metrics-comparison .tmc-context-menu {
    position: absolute;

  }
  #training-metrics-comparison .tmc-context-menu[hidden] {

  }
  #training-metrics-comparison .tmc-tooltip-row {

  }
  #training-metrics-comparison .tmc-legend {

    margin-top: 0.5rem;
  }
  #training-metrics-comparison .tmc-legend-item {

  }
  #training-metrics-comparison .tmc-detail {

    min-height: 1.4em;
    margin-top: 0.35rem;
    text-align: center;
  }

    hideContextMenu();
    clearHover();
    const width = Number(svg.getAttribute(&quot;width&quot;)) || Number(graphWidth.value);
    const height = Number(svg.getAttribute(&quot;height&quot;)) || Number(graphHeight.value);
    const font = Number(fontSize.value);
    const series = chartState?.series || [];
    const columns = 2;
    const rows = Math.max(1, Math.ceil(series.length / columns));
    const legendHeight = series.length ? Math.max(48, rows * font * 1.65 + 18) : 0;
    const exportHeight = height + legendHeight;
    const clone = svg.cloneNode(true);
    inlineComputedSvgStyles(svg, clone);
    clone.querySelectorAll(&quot;animate, .tmc-interaction-overlay, .tmc-hover-layer&quot;).forEach(node =&gt; node.remove());
    clone.setAttribute(&quot;xmlns&quot;, ns);
    clone.setAttribute(&quot;viewBox&quot;, `0 0 ${width} ${exportHeight}`);
    clone.setAttribute(&quot;width&quot;, String(width));
    clone.setAttribute(&quot;height&quot;, String(exportHeight));
    const rootStyles = getComputedStyle(root);
    const background = rootStyles.getPropertyValue(&quot;--background&quot;).trim() || &quot;#ffffff&quot;;
    const foreground = rootStyles.getPropertyValue(&quot;--foreground&quot;).trim() || &quot;#111111&quot;;
    const backgroundRect = makeSvg(&quot;rect&quot;, { x: 0, y: 0, width, height: exportHeight, fill: background });
    clone.insertBefore(backgroundRect, clone.firstChild);

    series.forEach((item, index) =&gt; {
      const column = index % columns;
      const row = Math.floor(index / columns);
      const x = 26 + column * width / columns;
      const y = height + 28 + row * font * 1.65;
      const color = rootStyles.getPropertyValue(colorVariableByExperiment[item.experiment]).trim();
      const sample = makeSvg(&quot;line&quot;, {
        x1: x, x2: x + 30, y1: y - font * 0.28, y2: y - font * 0.28,
        stroke: color, &quot;stroke-width&quot;: 2
      });
      if (item.split === &quot;Train&quot;) sample.setAttribute(&quot;stroke-dasharray&quot;, &quot;7 5&quot;);
      const label = makeSvg(&quot;text&quot;, {
        x: x + 38, y, fill: foreground, &quot;font-family&quot;: &quot;Times New Roman, Times, serif&quot;,
        &quot;font-size&quot;: font, &quot;font-weight&quot;: 400
      });
      label.textContent = `${item.experimentLabel} · ${item.split}`;
      clone.append(sample, label);
    });

    const serialized = new XMLSerializer().serializeToString(clone);
    const blob = new Blob([serialized], { type: &quot;image/svg+xml;charset=utf-8&quot; });
    const url = URL.createObjectURL(blob);
    try {
      const image = new Image();
      await new Promise((resolve, reject) =&gt; {
        image.onload = resolve;
        image.onerror = reject;
        image.src = url;
      });
      const scale = 2;
      const canvas = document.createElement(&quot;canvas&quot;);
      canvas.width = width * scale;
      canvas.height = exportHeight * scale;
      const context = canvas.getContext(&quot;2d&quot;);
      if (!context) throw new Error(&quot;Canvas rendering is unavailable&quot;);
      context.fillStyle = background;
      context.fillRect(0, 0, canvas.width, canvas.height);
      context.scale(scale, scale);
      context.drawImage(image, 0, 0, width, exportHeight);
      const pngBlob = await new Promise((resolve, reject) =&gt; {
        canvas.toBlob(result =&gt; result ? resolve(result) : reject(new Error(&quot;PNG creation failed&quot;)), &quot;image/png&quot;);
      });
      const pngUrl = URL.createObjectURL(pngBlob);
      const anchor = document.createElement(&quot;a&quot;);
      const safeModel = model.value.toLowerCase().replace(/\s+/g, &quot;-&quot;);
      const safeSplit = split.value.toLowerCase().replace(/\s+/g, &quot;-&quot;);
      anchor.href = pngUrl;
      anchor.download = `training-metrics-${safeModel}-r${ratio.value}-${safeSplit}.png`;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      setTimeout(() =&gt; URL.revokeObjectURL(pngUrl), 1000);
    } finally {
      URL.revokeObjectURL(url);
    }
  };

  const renderEmpty = (title, message, width, height) =&gt; {
    svg.replaceChildren();
    svg.setAttribute(&quot;viewBox&quot;, `0 0 ${width} ${height}`);
    svg.setAttribute(&quot;width&quot;, String(width));
    svg.setAttribute(&quot;height&quot;, String(height));
    svg.appendChild(makeSvg(&quot;rect&quot;, { x: 0, y: 0, width, height, fill: &quot;var(--background)&quot; }));
    svg.appendChild(textNode(width / 2, height / 2 - 12, title, &quot;tmc-empty-title&quot;));
    svg.appendChild(textNode(width / 2, height / 2 + 18, message, &quot;tmc-empty-text&quot;));
    legend.replaceChildren();
    previousPaths = new Map();
    chartState = null;
    clearHover();
    hideContextMenu();
  };

  const renderLegend = series =&gt; {
    legend.replaceChildren();
    series.forEach(item =&gt; {
      const entry = document.createElement(&quot;span&quot;);
      entry.className = &quot;tmc-legend-item&quot;;
      const swatch = document.createElement(&quot;span&quot;);
      swatch.className = &quot;tmc-swatch&quot;;
      swatch.style.borderTopColor = colorByExperiment[item.experiment];
      swatch.style.borderTopStyle = item.split === &quot;Train&quot; ? &quot;dashed&quot; : &quot;solid&quot;;
      const label = document.createElement(&quot;span&quot;);
      label.textContent = `${item.experimentLabel} · ${item.split}`;
      entry.append(swatch, label);
      legend.appendChild(entry);
    });
  };

  const showHover = (event, epoch) =&gt; {
    if (!chartState) return;
    const { series, xScale, yScale, margins, plotWidth, plotHeight, hoverLayer, width, height } = chartState;
    const available = series.filter(item =&gt; epoch &lt;= item.values.length);
    hoverLayer.replaceChildren();
    if (!available.length) {
      clearHover();
      return;
    }
    const x = xScale(epoch);
    hoverLayer.appendChild(makeSvg(&quot;line&quot;, {
      x1: x, x2: x, y1: margins.top, y2: margins.top + plotHeight, class: &quot;tmc-crosshair&quot;
    }));
    available.forEach(item =&gt; {
      const y = yScale(item.values[epoch - 1]);
      const color = colorByExperiment[item.experiment];
      const marker = item.split === &quot;Train&quot;
        ? makeSvg(&quot;rect&quot;, { x: x - 3.5, y: y - 3.5, width: 7, height: 7, rx: 1, fill: color, class: &quot;tmc-hover-point&quot; })
        : makeSvg(&quot;circle&quot;, { cx: x, cy: y, r: 4, fill: color, class: &quot;tmc-hover-point&quot; });
      hoverLayer.appendChild(marker);
    });

    tooltip.replaceChildren();
    const epochLine = document.createElement(&quot;div&quot;);
    epochLine.textContent = `Epoch ${epoch}`;
    tooltip.appendChild(epochLine);
    available.forEach(item =&gt; {
      const row = document.createElement(&quot;div&quot;);
      row.className = &quot;tmc-tooltip-row&quot;;
      row.textContent = `${item.experimentLabel} · ${item.split}: ${formatLoss(item.values[epoch - 1])}`;
      tooltip.appendChild(row);
    });
    tooltip.classList.add(&quot;is-visible&quot;);
    tooltip.setAttribute(&quot;aria-hidden&quot;, &quot;false&quot;);

    const svgRect = svg.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const xCss = (x / width) * svgRect.width;
    const yCss = event.clientY - stageRect.top;
    const gap = 12;
    let left = xCss + gap;
    let top = yCss + gap;
    const tooltipWidth = tooltip.offsetWidth;
    const tooltipHeight = tooltip.offsetHeight;
    if (left + tooltipWidth &gt; stage.clientWidth) left = Math.max(0, xCss - tooltipWidth - gap);
    if (top + tooltipHeight &gt; stage.clientHeight) top = Math.max(0, yCss - tooltipHeight - gap);
    tooltip.style.left = `${left}px`;
    tooltip.style.top = `${top}px`;
    detail.textContent = `Epoch ${epoch} · ${available.map(item =&gt; `${item.experimentLabel} ${item.split} ${formatLoss(item.values[epoch - 1])}`).join(&quot; · &quot;)}`;
  };

  const render = () =&gt; {
    const width = Number(graphWidth.value);
    const height = Number(graphHeight.value);
    const font = Number(fontSize.value);
    root.style.setProperty(&quot;--font-size-base&quot;, `${font}px`);
    root.style.setProperty(&quot;--tmc-chart-width&quot;, `${width}px`);
    root.querySelector(&quot;#tmc-font-value&quot;).textContent = `${font} px`;
    root.querySelector(&quot;#tmc-width-value&quot;).textContent = `${width} px`;
    root.querySelector(&quot;#tmc-height-value&quot;).textContent = `${height} px`;

    if (metric.value === &quot;nmse&quot;) {
      renderEmpty(&quot;NMSE data unavailable&quot;, &quot;Epoch-level NMSE was not stored in the checkpoints.&quot;, width, height);
      summary.textContent = &quot;Epoch-level NMSE data is unavailable for all four experiments.&quot;;
      hasRendered = true;
      return;
    }

    const series = visibleSeries();
    if (!series.length) {
      renderEmpty(&quot;No experiment selected&quot;, &quot;Select at least one experiment to display Loss.&quot;, width, height);
      summary.textContent = &quot;No experiment is selected.&quot;;
      hasRendered = true;
      return;
    }

    clearHover();
    svg.replaceChildren();
    svg.setAttribute(&quot;viewBox&quot;, `0 0 ${width} ${height}`);
    svg.setAttribute(&quot;width&quot;, String(width));
    svg.setAttribute(&quot;height&quot;, String(height));
    svg.appendChild(makeSvg(&quot;rect&quot;, { x: 0, y: 0, width, height, fill: &quot;var(--background)&quot; }));
    const margins = {
      top: Math.max(18, font * 1.4),
      right: Math.max(18, font * 1.2),
      bottom: Math.max(58, font * 3.7),
      left: Math.max(72, font * 5.0)
    };
    const plotWidth = Math.max(120, width - margins.left - margins.right);
    const plotHeight = Math.max(120, height - margins.top - margins.bottom);
    const maxEpoch = Math.max(...series.map(item =&gt; item.values.length));
    const allValues = series.flatMap(item =&gt; item.values);
    const rawMin = Math.min(...allValues);
    const rawMax = Math.max(...allValues);
    const rawRange = Math.max(rawMax - rawMin, Math.abs(rawMax) * 0.05, 0.01);
    const yMin = rawMin - rawRange * 0.08;
    const yMax = rawMax + rawRange * 0.08;
    const xScale = epoch =&gt; margins.left + (epoch - 1) / Math.max(maxEpoch - 1, 1) * plotWidth;
    const yScale = value =&gt; margins.top + (yMax - value) / Math.max(yMax - yMin, Number.EPSILON) * plotHeight;

    const yStep = niceStep(yMax - yMin, 6);
    const yFirst = Math.ceil(yMin / yStep) * yStep;
    for (let value = yFirst; value &lt;= yMax + yStep * 0.25; value += yStep) {
      const y = yScale(value);
      svg.appendChild(makeSvg(&quot;line&quot;, { x1: margins.left, x2: margins.left + plotWidth, y1: y, y2: y, class: &quot;tmc-grid&quot; }));
      svg.appendChild(textNode(margins.left - 10, y + font * 0.32, formatLoss(value), &quot;tmc-axis-text&quot;, &quot;end&quot;));
    }

    const xTicks = [1];
    const xStep = Math.max(1, niceStep(maxEpoch - 1, 8));
    for (let value = Math.ceil(2 / xStep) * xStep; value &lt;= maxEpoch; value += xStep) {
      if (value &gt; 1) xTicks.push(value);
    }
    if (xTicks[xTicks.length - 1] !== maxEpoch) xTicks.push(maxEpoch);
    [...new Set(xTicks)].forEach(value =&gt; {
      const x = xScale(value);
      svg.appendChild(makeSvg(&quot;line&quot;, { x1: x, x2: x, y1: margins.top, y2: margins.top + plotHeight, class: &quot;tmc-grid&quot; }));
      svg.appendChild(textNode(x, margins.top + plotHeight + font * 1.55, String(value), &quot;tmc-axis-text&quot;));
    });

    svg.appendChild(makeSvg(&quot;line&quot;, { x1: margins.left, x2: margins.left, y1: margins.top, y2: margins.top + plotHeight, class: &quot;tmc-axis&quot; }));
    svg.appendChild(makeSvg(&quot;line&quot;, { x1: margins.left, x2: margins.left + plotWidth, y1: margins.top + plotHeight, y2: margins.top + plotHeight, class: &quot;tmc-axis&quot; }));
    svg.appendChild(textNode(margins.left + plotWidth / 2, height - font * 0.55, &quot;Epoch&quot;, &quot;tmc-axis-label&quot;));
    const yLabel = textNode(font * 1.2, margins.top + plotHeight / 2, &quot;Loss&quot;, &quot;tmc-axis-label&quot;);
    yLabel.setAttribute(&quot;transform&quot;, `rotate(-90 ${font * 1.2} ${margins.top + plotHeight / 2})`);
    svg.appendChild(yLabel);

    const newPaths = new Map();
    series.forEach(item =&gt; {
      const key = seriesKey(item);
      const d = resampledPath(item.values, 64, xScale, yScale);
      const path = makeSvg(&quot;path&quot;, {
        d,
        class: &quot;tmc-series&quot;,
        stroke: colorByExperiment[item.experiment]
      });
      if (item.split === &quot;Train&quot;) path.setAttribute(&quot;stroke-dasharray&quot;, &quot;7 5&quot;);
      if (hasRendered &amp;&amp; !reducedMotion.matches) {
        const from = previousPaths.get(key) || baselinePath(item.values.length, 64, xScale, margins.top + plotHeight);
        const animation = makeSvg(&quot;animate&quot;, {
          attributeName: &quot;d&quot;,
          from,
          to: d,
          dur: &quot;280ms&quot;,
          fill: &quot;freeze&quot;
        });
        path.appendChild(animation);
      }
      svg.appendChild(path);
      newPaths.set(key, d);
    });

    const hoverLayer = makeSvg(&quot;g&quot;, { &quot;aria-hidden&quot;: &quot;true&quot;, class: &quot;tmc-hover-layer&quot; });
    svg.appendChild(hoverLayer);
    const overlay = makeSvg(&quot;rect&quot;, {
      x: margins.left,
      y: margins.top,
      width: plotWidth,
      height: plotHeight,
      fill: &quot;transparent&quot;,
      class: &quot;tmc-interaction-overlay&quot;,
      &quot;pointer-events&quot;: &quot;all&quot;
    });
    overlay.addEventListener(&quot;mousemove&quot;, event =&gt; {
      const rect = svg.getBoundingClientRect();
      const localX = (event.clientX - rect.left) * width / Math.max(rect.width, 1);
      const epoch = Math.max(1, Math.min(maxEpoch, Math.round(1 + (localX - margins.left) / plotWidth * (maxEpoch - 1))));
      showHover(event, epoch);
    });
    overlay.addEventListener(&quot;mouseleave&quot;, clearHover);
    svg.appendChild(overlay);

    chartState = { series, xScale, yScale, margins, plotWidth, plotHeight, hoverLayer, width, height };
    previousPaths = newPaths;
    renderLegend(series);
    summary.textContent = `${model.value}, pilot ratio ${ratio.value}, ${split.value} Loss over ${maxEpoch} epochs for ${selectedExperiments().size} selected experiments.`;
    hasRendered = true;
  };

  [metric, model, ratio, split, ...experimentChecks].forEach(control =&gt; control.addEventListener(&quot;change&quot;, render));
  [fontSize, graphWidth, graphHeight].forEach(control =&gt; control.addEventListener(&quot;input&quot;, render));
  svg.addEventListener(&quot;contextmenu&quot;, event =&gt; {
    event.preventDefault();
    const rect = stage.getBoundingClientRect();
    contextMenu.hidden = false;
    const left = Math.min(event.clientX - rect.left, Math.max(0, stage.clientWidth - contextMenu.offsetWidth));
    const top = Math.min(event.clientY - rect.top, Math.max(0, stage.clientHeight - contextMenu.offsetHeight));
    contextMenu.style.left = `${Math.max(0, left)}px`;
    contextMenu.style.top = `${Math.max(0, top)}px`;
  });
  savePng.addEventListener(&quot;click&quot;, () =&gt; { exportPng().catch(error =&gt; { detail.textContent = error.message; }); });
  root.addEventListener(&quot;click&quot;, event =&gt; {
    if (!contextMenu.hidden &amp;&amp; !contextMenu.contains(event.target)) hideContextMenu();
  });
  root.addEventListener(&quot;keydown&quot;, event =&gt; {
    if (event.key === &quot;Escape&quot;) hideContextMenu();
  });
  render();
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
